    .no-media { display: flex; align-items: center; justify-content: center; color: #555; font-size: 12px; height: 100%; }

</script>
<script>
(function() {
  const ASSET_BASE = window.__SCENEBIND_PAYLOAD__ ? '' : '/';
  const state = {
    payload: null,
    clipDirMap: {},
    selectedByDir: {},
    direction: '__all__',
    dirOrder: ['a2v', 'v2a', 'a2t', 't2a', 'v2t', 't2v'],
    focusIndex: 0,
    totalItems: 0,
  };
  const DIR_LABELS = {
    a2v: 'Audio to Visual',
    v2a: 'Visual to Audio',
    a2t: 'Audio to Text',
    t2a: 'Text to Audio',
    v2t: 'Visual to Text',
    t2v: 'Text to Visual',
  };
  const ALL_KEY = '__all__';
  const ALL_LABEL = 'All Queries';

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function scoreClass(val) {
    if (val >= 0.5) return 'score-good';
    if (val >= 0.3) return 'score-mid';
    return 'score-low';
  }

  function gtRankClass(rank) {
    if (rank == null) return 'bad';
    if (rank <= 3) return 'good';
    if (rank <= 10) return 'mid';
    return 'bad';
  }

  function targetKind(direction) {
    const tail = direction.split('2').pop();
    if (tail === 'v') return 'image';
    if (tail === 'a') return 'audio';
    return 'text';
  }

  function azimuthDegToLabel(deg) {
    if (!Number.isFinite(deg)) return '-';
    if (deg >= -15 && deg <= 15) return 'front-center';
    if (deg > 15 && deg <= 45) return 'slight-right';
    if (deg < -15 && deg >= -45) return 'slight-left';
    if (deg > 45 && deg < 135) return 'right';
    if (deg < -45 && deg > -135) return 'left';
    return 'back';
  }

  function elevDegToLabel(deg) {
    if (!Number.isFinite(deg)) return '-';
    if (deg > 10) return 'high';
    if (deg < -10) return 'low';
    return 'level';
  }

  function distMetersToLabel(dist) {
    if (!Number.isFinite(dist)) return '-';
    if (dist > 10) return '>10m';
    if (dist > 5) return '5-10m';
    if (dist >= 1.5) return '1.5-5m';
    return '<1.5m';
  }

  function distBucketToRange(label) {
    const s = String(label || '').trim().toLowerCase();
    if (!s) return '-';
    if (s.includes('far')) return '>10m';
    if (s.includes('mid')) return '5-10m';
    if (s.includes('near')) return '1.5-5m';
    if (s.includes('close')) return '<1.5m';
    return s;
  }

  function azimuthToLabel(aziLabel) {
    const s = String(aziLabel || '').trim();
    const m = s.match(/-?\d+/);
    if (!m) return s || '-';
    const deg = Number(m[0]);
    if (deg >= -20 && deg <= 20) return 'front';
    if (deg > 20 && deg < 160) return 'front-right';
    if (deg >= 160 || deg <= -160) return 'back';
    if (deg < -20 && deg > -160) return 'front-left';
    return s || '-';
  }

  function semanticAnnotationByEvent(clipId, eventId, fallback = '-') {
    const events = state.payload?.clips?.[clipId]?.events || [];
    const found = events.find(e => e.event_id === eventId);
    return found?.semantic_anno || found?.combined_anno || fallback;
  }

  function querySemanticMeta(meta) {
    const allEvents = Array.isArray(meta?.events) ? meta.events : [];
    const lines = [];
    const seen = new Set();
    for (const ev of allEvents) {
      const sem = ev?.semantic_anno || ev?.combined_anno || ev?.semantic_tag || '-';
      const spatial = `${azimuthDegToLabel(Number(ev?.azimuth))}; ${elevDegToLabel(Number(ev?.elevation))}; ${distMetersToLabel(Number(ev?.distance_meters))}`;
      const key = `${sem}||${spatial}`;
      if (seen.has(key)) continue;
      seen.add(key);
      lines.push(`${sem} | ${spatial}`);
    }
    if (!lines.length) lines.push('- | -; -; -');
    return lines;
  }

  function sourceModalitiesForToText(direction) {
    if (direction === 'a2t') return new Set(['audio_visual', 'audio_only']);
    if (direction === 'v2t') return new Set(['audio_visual', 'visual_only']);
    return null;
  }

  function textMetaForDirection(meta, direction) {
    const allEvents = Array.isArray(meta?.events) ? meta.events : [];
    const keepModalities = sourceModalitiesForToText(direction);
    const events = keepModalities ? allEvents.filter(e => keepModalities.has(e?.modality)) : allEvents;
    const semanticSpatialLines = [];
    const seenKeys = new Set();
    for (const ev of events) {
      const sem = ev?.semantic_anno || ev?.combined_anno || ev?.semantic_tag || '-';
      const spatial = `${azimuthDegToLabel(Number(ev?.azimuth))}; ${elevDegToLabel(Number(ev?.elevation))}; ${distMetersToLabel(Number(ev?.distance_meters))}`;
      const key = `${sem}||${spatial}`;
      if (seenKeys.has(key)) continue;
      seenKeys.add(key);
      semanticSpatialLines.push(`${sem} | ${spatial}`);
    }
    if (!semanticSpatialLines.length) semanticSpatialLines.push('- | -; -; -');
    return semanticSpatialLines;
  }

  function renderLeft(clipMeta) {
    const imgHtml = clipMeta.image_asset
      ? `<div class="query-image"><img src="${ASSET_BASE}${esc(clipMeta.image_asset)}" alt=""></div>`
      : `<div class="query-image"><div class="no-media">No image available</div></div>`;

    let audioHtml = '';
    if (clipMeta.audio_asset || clipMeta.audio_thumb) {
      const thumbHtml = clipMeta.audio_thumb ? `<div class="audio-thumb"><img src="${ASSET_BASE}${esc(clipMeta.audio_thumb)}" alt=""></div>` : '';
      const playerHtml = clipMeta.audio_asset ? `<audio class="audio-player" controls preload="metadata" src="${ASSET_BASE}${esc(clipMeta.audio_asset)}"></audio>` : '';
      audioHtml = `<div class="query-audio-section">${thumbHtml}${playerHtml}</div>`;
    }

    const lines = querySemanticMeta(clipMeta);
    const textHtml = clipMeta.scene_description
      ? `<div class="query-text">${esc(clipMeta.scene_description)}<div class="query-meta">${lines.map(l => `<div>${esc(l)}</div>`).join('')}</div></div>`
      : '';

    return `<div class="panel-title">Query Clip</div>${imgHtml}${audioHtml}${textHtml}`;
  }

  function renderMiddle(clipId, direction) {
    const caseData = state.clipDirMap[clipId]?.[direction];
    if (!caseData) return '<div class="no-results">No retrieval data for this query.</div>';

    const kind = targetKind(direction);
    const scenebindId = state.payload.methods.find(m => m.type === 'scenebind')?.method_id || 'scenebind';
    let html = '';

    for (const method of state.payload.methods) {
      const mid = method.method_id;
      const mData = caseData.methods?.[mid];
      if (!mData) continue;
      const showScores = mid === scenebindId;
      const rankVal = mData.gt_rank;
      const rankText = rankVal != null ? `GT @ rank ${rankVal}` : 'GT not in top-k';
      const rankCls = gtRankClass(rankVal);

      let cardsHtml = '';
      const top3 = (mData.top5 || []).slice(0, 3);
      for (const item of top3) {
        const itemMeta = state.payload.clips[item.sample_id] || { clip_id: item.sample_id };
        const isGt = item.is_gt;
        const cardClass = 'result-card' + (isGt ? ' is-gt' : '') + (kind === 'text' ? ' is-text' : '');
        let mediaContent = '';
        if (kind === 'image') {
          mediaContent = itemMeta.image_asset ? `<img src="${ASSET_BASE}${esc(itemMeta.image_asset)}" alt="">` : '<div class="no-media">No image</div>';
        } else if (kind === 'audio') {
          mediaContent = itemMeta.audio_thumb ? `<div class="audio-card-thumb"><img src="${ASSET_BASE}${esc(itemMeta.audio_thumb)}" alt=""></div>` : '<div class="no-media">Audio</div>';
        } else {
          const txt = itemMeta.scene_description || itemMeta.clip_id || '';
          const lines = textMetaForDirection(itemMeta, direction);
          mediaContent = `<div class="text-content">${esc(txt)}${lines.map(line => `<div class="text-meta">${esc(line)}</div>`).join('')}</div>`;
        }

        const audioPlayer = (kind === 'audio' && itemMeta.audio_asset)
          ? `<div class="card-audio-player"><audio controls preload="none" src="${ASSET_BASE}${esc(itemMeta.audio_asset)}"></audio></div>`
          : '';

        cardsHtml += `
          <div class="${cardClass}">
            <div class="card-media">
              ${mediaContent}
              <span class="card-rank">#${item.rank}</span>
              ${isGt ? '<span class="card-gt-badge">GT</span>' : ''}
            </div>
            ${audioPlayer}
            ${showScores ? `<div class="card-scores">
              <span><span class="label">global</span> ${Number(item.clip_score ?? 0).toFixed(3)}</span>
              <span><span class="label">object</span> ${Number(item.grid_score ?? 0).toFixed(3)}</span>
              <span><span class="label">scene</span> ${Number(item.joint_score ?? 0).toFixed(3)}</span>
            </div>` : ''}
          </div>`;
      }

      html += `
        <div class="method-row">
          <div class="method-header">
            <span class="method-name">${esc(method.display_name)}</span>
            <span class="gt-rank ${rankCls}">${rankText}</span>
          </div>
          <div class="top-cards">${cardsHtml}</div>
        </div>`;
    }

    return html || '<div class="no-results">No method results available.</div>';
  }

  function renderRight(clipId, direction) {
    const caseData = state.clipDirMap[clipId]?.[direction];
    if (!caseData || !caseData.query_slots) {
      return '<div class="panel-title">Grounded Objects</div><div class="no-results">No slot data.</div>';
    }
    const qs = caseData.query_slots;
    let html = '<div class="panel-title">Grounded Objects</div>';

    function renderSlotsTable(slots, label) {
      if (!slots || !slots.length) return '';
      const maxSemConfProductBySem = new Map();
      for (const slot of slots) {
        const gt = slot.best_match_gt || {};
        const semAnno = semanticAnnotationByEvent(clipId, gt.event_id, gt.semantic_tag || '-');
        const semSim = Number(slot?.scores?.semantic ?? 0);
        const conf = Number(slot?.confidence ?? 0);
        const product = semSim * conf;
        const prev = maxSemConfProductBySem.get(semAnno);
        if (prev == null || product > prev) maxSemConfProductBySem.set(semAnno, product);
      }
      let tbl = `<div class="slots-section"><div class="slots-section-title">${esc(label)}</div>`;
      tbl += `<table class="slots-table">
      <colgroup>
        <col class="col-idx"><col class="col-semanno"><col class="col-azi"><col class="col-elev"><col class="col-dist"><col class="col-semsim"><col class="col-conf">
      </colgroup>
      <thead><tr>
        <th>#</th><th>Sem Annotation</th><th>Azi</th><th>Elev</th><th>Dist</th><th>Sem-sim</th><th>Conf</th>
      </tr></thead><tbody>`;

      for (const slot of slots) {
        const gt = slot.best_match_gt || {};
        const ps = slot.pred_spatial_label || {};
        const scores = slot.scores || {};
        const conf = slot.confidence ?? 0;
        const semAnno = semanticAnnotationByEvent(clipId, gt.event_id, gt.semantic_tag || '-');
        const product = Number(scores.semantic ?? 0) * Number(conf ?? 0);
        const maxProduct = Number(maxSemConfProductBySem.get(semAnno) ?? -1);
        const isTop = Math.abs(product - maxProduct) < 1e-12;
        tbl += `<tr>
          <td>${slot.slot_index}</td>
          <td class="${isTop ? 'sem-anno-top' : ''}">${esc(semAnno)}</td>
          <td>${esc(azimuthToLabel(ps.azi_label || '-'))}</td>
          <td>${esc(ps.elev_label || '-')}</td>
          <td>${esc(distBucketToRange(ps.dist_label || '-'))}</td>
          <td><span class="score-val ${scoreClass(scores.semantic)}">${Number(scores.semantic ?? 0).toFixed(2)}</span></td>
          <td>${Number(conf).toFixed(2)}</td>
        </tr>`;
      }
      tbl += '</tbody></table></div>';
      return tbl;
    }

    if (Array.isArray(qs)) {
      html += renderSlotsTable(qs, 'Slots');
    } else {
      if (qs.audio) html += renderSlotsTable(qs.audio, 'Audio Slots');
      if (qs.visual) html += renderSlotsTable(qs.visual, 'Visual Slots');
    }
    return html;
  }

  function renderClipBlock(clipId, direction) {
    const clipMeta = state.payload.clips[clipId] || { clip_id: clipId };
    return `
      <section class="clip-block">
        <div class="clip-header">
          <div class="clip-id">${esc(clipId)}</div>
        </div>
        <div class="main-layout">
          <div class="left-panel">${renderLeft(clipMeta)}</div>
          <div class="middle-panel">${renderMiddle(clipId, direction)}</div>
          <div class="right-panel">${renderRight(clipId, direction)}</div>
        </div>
      </section>`;
  }

  function renderTabs() {
    const tabs = document.getElementById('dirTabs');
    tabs.innerHTML = '';
    const allCount = state.dirOrder.reduce((sum, d) => sum + ((state.selectedByDir[d] || []).length), 0);
    const allBtn = document.createElement('button');
    allBtn.className = 'dir-tab' + (state.direction === ALL_KEY ? ' active' : '');
    allBtn.textContent = `${ALL_LABEL} (${allCount})`;
    allBtn.onclick = () => {
      state.direction = ALL_KEY;
      render();
    };
    tabs.appendChild(allBtn);

    for (const dir of state.dirOrder) {
      const count = (state.selectedByDir[dir] || []).length;
      const btn = document.createElement('button');
      btn.className = 'dir-tab' + (dir === state.direction ? ' active' : '');
      const label = DIR_LABELS[dir] || dir;
      btn.textContent = `${label} (${count})`;
      btn.onclick = () => {
        state.direction = dir;
        render();
      };
      tabs.appendChild(btn);
    }
  }

  function focusClip(index) {
    const blocks = document.querySelectorAll('.clip-block');
    if (!blocks.length) return;
    state.focusIndex = Math.max(0, Math.min(index, blocks.length - 1));
    blocks.forEach((b, i) => b.classList.toggle('focused', i === state.focusIndex));
    blocks[state.focusIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
    updateNavUI();
  }

  function navPrev() { focusClip(state.focusIndex - 1); }
  function navNext() { focusClip(state.focusIndex + 1); }
  window.__navPrev = navPrev;
  window.__navNext = navNext;

  function updateNavUI() {
    const blocks = document.querySelectorAll('.clip-block');
    const total = blocks.length;
    state.totalItems = total;
    document.getElementById('navCounter').textContent = total ? `${state.focusIndex + 1} / ${total}` : '-';
    document.getElementById('navPrev').disabled = state.focusIndex <= 0;
    document.getElementById('navNext').disabled = state.focusIndex >= total - 1;
  }

  function render() {
    renderTabs();
    const container = document.getElementById('content');

    if (state.direction === ALL_KEY) {
      const allItems = [];
      for (const dir of state.dirOrder) {
        const ids = state.selectedByDir[dir] || [];
        for (const id of ids) allItems.push({ dir, id });
      }
      const summary = `${ALL_LABEL}: ${allItems.length} selected query${allItems.length === 1 ? '' : 's'}`;
      document.getElementById('summary').textContent = summary;
      if (!allItems.length) {
        container.innerHTML = `<div class="empty">当前没有已选 query。</div>`;
        updateNavUI();
        return;
      }
      container.innerHTML = allItems.map(item => renderClipBlock(item.id, item.dir)).join('');
    } else {
      const ids = state.selectedByDir[state.direction] || [];
      const summary = `${DIR_LABELS[state.direction] || state.direction}: ${ids.length} selected query${ids.length === 1 ? '' : 's'}`;
      document.getElementById('summary').textContent = summary;

      if (!ids.length) {
        container.innerHTML = `<div class="empty">当前方向 ${esc(state.direction)} 没有已选 query。</div>`;
        updateNavUI();
        return;
      }

      container.innerHTML = ids.map(id => renderClipBlock(id, state.direction)).join('');
    }

    state.focusIndex = 0;
    updateNavUI();
    const firstBlock = document.querySelector('.clip-block');
    if (firstBlock) firstBlock.classList.add('focused');
  }

  function buildSelectedByDir(selectionKeys) {
    const byDir = {};
    for (const d of state.dirOrder) byDir[d] = [];
    for (const key of selectionKeys) {
      const text = String(key || '');
      if (text.startsWith('*::')) continue;
      const idx = text.indexOf('::');
      if (idx <= 0) continue;
      const dir = text.slice(0, idx);
      const clipId = text.slice(idx + 2);
      if (!byDir[dir]) continue;
      if (!state.clipDirMap[clipId]?.[dir]) continue;
      byDir[dir].push(clipId);
    }
    for (const dir of Object.keys(byDir)) {
      byDir[dir] = [...new Set(byDir[dir])].sort();
    }
    return byDir;
  }

  async function loadData() {
    if (window.__SCENEBIND_PAYLOAD__ && window.__SCENEBIND_SELECTION__) {
      return {
        payload: window.__SCENEBIND_PAYLOAD__,
        selection: window.__SCENEBIND_SELECTION__,
      };
    }
    const [payloadRes, selRes] = await Promise.all([
      fetch('/data/render_payload.json'),
      fetch('/api/selection'),
    ]);
    return {
      payload: await payloadRes.json(),
      selection: await selRes.json(),
    };
  }

  async function init() {
    const { payload, selection } = await loadData();
    state.payload = payload;

    const clipDirMap = {};
    for (const c of payload.cases) {
      if (!clipDirMap[c.query_id]) clipDirMap[c.query_id] = {};
      if (!clipDirMap[c.query_id][c.direction]) clipDirMap[c.query_id][c.direction] = c;
    }
    state.clipDirMap = clipDirMap;

    const selectedKeys = Array.isArray(selection.selected_query_direction_keys) ? selection.selected_query_direction_keys : [];
    state.selectedByDir = buildSelectedByDir(selectedKeys);

    state.direction = ALL_KEY;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('toolbar').style.display = '';
    document.getElementById('content').style.display = '';

    document.getElementById('navPrev').addEventListener('click', navPrev);
    document.getElementById('navNext').addEventListener('click', navNext);

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowUp' || e.key === 'k') { e.preventDefault(); navPrev(); }
      if (e.key === 'ArrowDown' || e.key === 'j') { e.preventDefault(); navNext(); }
    });

    render();
  }

  init().catch(err => {
    document.getElementById('loading').innerHTML = `<p style="color:#f87171">Failed to load: ${esc(err.message)}</p>`;
  });
})();
</script>
</body>
</html>
